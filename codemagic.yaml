workflows:
  ios-unsigned:
    name: iOS Unsigned (for sideloading)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      # ВАЖНО: пиним точную версию Flutter, а не 'stable'.
      # 'stable' плавает и однажды сломает сборку сменой поведения (как сейчас).
      # Подставь версию, на которой собирался рабочий +1 (flutter --version),
      # либо любую известно-рабочую. Пример:
      flutter: 3.32.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter packages
        script: flutter pub get

      # Готовим iOS-проект (Generated.xcconfig) БЕЗ сборки и БЕЗ подписи.
      # --config-only не запускает xcodebuild; --no-codesign убирает проверку
      # сертификата, которую config-only всё равно делает для device-таргета.
      - name: Configure iOS project (no build)
        script: flutter build ios --release --config-only --no-codesign

      - name: Pods
        script: |
          cd ios
          pod install

      # Собираем НЕподписанный .app напрямую, отключив подпись на уровне билд-системы.
      # Именно это обходит обманчивую ошибку про Development Team.
      - name: Build unsigned .app (xcodebuild)
        script: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios_unsigned \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      # Упаковываем .app в .ipa (IPA = zip с папкой Payload/).
      - name: Package unsigned IPA
        script: |
          set -e
          APP=$(find build/ios_unsigned -path '*Release-iphoneos/Runner.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ОШИБКА: Runner.app не найден. Раскладка build/ios_unsigned:"
            find build/ios_unsigned -name '*.app' -maxdepth 6 || true
            exit 1
          fi
          echo "Найден .app: $APP"
          rm -rf Payload MINI-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r MINI-unsigned.ipa Payload

    artifacts:
      - MINI-unsigned.ipa