workflows:
  ios-unsigned:                          # идентификатор воркфлоу
    name: iOS Unsigned (for sideloading) # имя в дашборде Codemagic
    instance_type: mac_mini_m2           # бесплатная M2-машина (500 мин/мес)
    max_build_duration: 60               # предохранитель: убить сборку после 60 мин

    environment:
      flutter: stable                    # канал Flutter SDK
      xcode: latest                      # версия Xcode
      cocoapods: default                 # менеджер нативных iOS-зависимостей

    scripts:
      # Шаг 1 — подтянуть зависимости из pubspec.yaml (в т.ч. google_fonts).
      - name: Flutter packages
        script: flutter pub get

      # Шаг 2 — скомпилировать НЕподписанный .app.
      # --no-codesign = не трогаем сертификаты; подпишет AltStore на твоём ПК.
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign

      # Шаг 3 — вручную упаковать .app в .ipa.
      # IPA = обычный zip с папкой Payload/ внутри, где лежит Runner.app.
      - name: Package unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r MINI-unsigned.ipa Payload

    artifacts:
      - build/ios/iphoneos/*.ipa         # что отдать на скачивание
