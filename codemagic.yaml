workflows:
  ios-unsigned:
    name: iOS Unsigned (for sideloading)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      # Пинить НУЖНО — но ПАРОЙ и на ИЗВЕСТНО-РАБОЧУЮ комбинацию.
      # Возвращаю stable, чтобы Flutter снова совпал с 'xcode: latest' —
      # это среда, на которой собрался твой первый рабочий IPA.
      # Как получишь зелёную сборку: открой её лог, найди строки вида
      #   "Flutter 3.x.y" и версию Xcode — и вот ЭТУ пару потом закрепи здесь
      #   (flutter: 3.x.y  и  xcode: 16.x), чтобы сборка стала детерминированной.
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter packages
        script: flutter pub get

      # Собираем .app. Flutter в этой версии доходит до "Xcode build done",
      # затем падает на ненужном нам пост-шаге подписи. Мы ловим ВЕСЬ вывод в лог,
      # глушим (обманчивый) код возврата и решаем по факту наличия .app.
      # Если .app нет — печатаем настоящие ошибки и падаем внятно.
      - name: Build unsigned app (self-diagnosing)
        script: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee /tmp/b.log || true
          if [ -d build/ios/iphoneos/Runner.app ]; then
            echo "OK: .app создан — пост-шаг подписи игнорируем."
          else
            echo "==================== .app НЕ создан. РЕАЛЬНЫЕ ОШИБКИ: ===================="
            grep -nEi "error:|exception|could not|no such|not found|fatal|fail|xcodebuild|codesign|swift|deployment|sdk" /tmp/b.log | tail -n 100
            echo "==================== ХВОСТ ЛОГА: ===================="
            tail -n 70 /tmp/b.log
            exit 1
          fi

      - name: Package unsigned IPA
        script: |
          set -e
          APP=build/ios/iphoneos/Runner.app
          [ -d "$APP" ] || { echo "нет .app"; exit 1; }
          rm -rf Payload MINI-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r MINI-unsigned.ipa Payload

    artifacts:
      - MINI-unsigned.ipa