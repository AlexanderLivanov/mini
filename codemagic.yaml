workflows:
  ios-unsigned:
    name: iOS Unsigned (for sideloading)
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      # ВАЖНО: пиним точную версию Flutter, а не 'stable'.
      # 'stable' плавает и однажды сломает сборку сменой поведения (как сейчас).
      # Подставь версию, на которой собирался рабочий +1 (flutter --version),
      # либо любую известно-рабочую. Пример:
      flutter: 3.32.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter packages
        script: flutter pub get

      # Flutter сам корректно собирает .app (ставит поды, склеивает xcconfig,
      # прогоняет Run Script). В этой версии он доходит до "Xcode build done",
      # а затем падает на пост-шаге деплоя, требующем подпись. Нам этот пост-шаг
      # не нужен: мы забираем уже собранный .app. Поэтому глушим код возврата —
      # успех определяем не по exit code (он врёт), а по наличию артефакта ниже.
      - name: Build unsigned app (ignore misleading post-step)
        script: flutter build ios --release --no-codesign || true

      # Упаковываем .app в .ipa. Здесь и находится настоящая проверка успеха:
      # если .app не создан — значит сборка реально упала, падаем внятно.
      - name: Package unsigned IPA
        script: |
          set -e
          APP=build/ios/iphoneos/Runner.app
          if [ ! -d "$APP" ]; then
            echo "ОШИБКА: $APP не создан — сборка упала ДО генерации .app."
            echo "Содержимое build/ios/iphoneos:"
            ls -la build/ios/iphoneos || true
            exit 1
          fi
          echo "Найден .app: $APP"
          rm -rf Payload MINI-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r MINI-unsigned.ipa Payload

    artifacts:
      - MINI-unsigned.ipa