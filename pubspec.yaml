    sdk: flutter
  # google_fonts подгружает Caveat / Fraunces / Archivo / Space Mono —
  # нашу 4-шрифтовую систему из StayInspired, без ручного скачивания .ttf.
  google_fonts: ^6.2.1

flutter:
  uses-material-design: true
